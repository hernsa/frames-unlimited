<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14141a">
  <title>Frames — watch anything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Frames</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-view="home">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Home</span>
      </a>
      <a class="nav-item" data-view="explore">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polygon points="1 1 22 1 22 22 1 22" opacity=".3"/><polygon points="5 5 19 5 19 19 5 19"/></svg>
        <span>Explore</span>
      </a>
      <a class="nav-item" data-view="mylist">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>My List</span>
      </a>
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-genres" id="sidebar-genres"></div>
    <div class="sidebar-footer">
      <button class="sidebar-player-btn" id="player-switch">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span id="player-label">VidEasy</span>
      </button>
    </div>
  </aside>

  <main class="main" id="main">
    <header class="topbar" id="topbar">
      <button class="topbar-menu" id="menu-btn" aria-label="Menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-area">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input type="text" id="search-input" placeholder="Search movies & shows..." autocomplete="off">
        <button class="search-clear" id="search-clear">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="search-drop" id="search-drop"></div>
      </div>
      <div class="topbar-right">
        <button class="topbar-avatar" id="avatar-btn">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="profile">
        </button>
      </div>
    </header>

    <div class="content" id="content">
      <section class="view active" id="view-home"></section>
      <section class="view" id="view-explore">
        <div class="explore-top">
          <h1 class="view-title" id="explore-title">Browse</h1>
          <div class="explore-tabs" id="explore-tabs">
            <button class="tab active" data-tab="all">All</button>
            <button class="tab" data-tab="movie">Movies</button>
            <button class="tab" data-tab="tv">TV Shows</button>
          </div>
        </div>
        <div class="explore-grid" id="explore-grid"></div>
        <div class="spinner-area" id="explore-spinner"><div class="spinner"></div></div>
        <div class="sentinel" id="explore-sentinel"></div>
      </section>
      <section class="view" id="view-mylist">
        <h1 class="view-title">My List</h1>
        <div class="explore-grid" id="mylist-grid"></div>
        <div class="empty-state" id="mylist-empty">
          <p>Your list is empty — add some titles to watch later.</p>
        </div>
      </section>
    </div>
  </main>
</div>

<div class="overlay" id="detail-overlay">
  <div class="detail" id="detail">
    <button class="detail-close" id="detail-close">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="detail-scroll">
      <div class="detail-hero" id="detail-hero">
        <div class="detail-hero-fade"></div>
        <div class="detail-hero-inner">
          <h1 class="detail-title" id="detail-title"></h1>
          <div class="detail-actions">
            <button class="btn-play" id="detail-play">
              <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l15 8-15 8z"/></svg>
              Play
            </button>
            <button class="btn-outline" id="detail-list">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="detail-cols">
          <div>
            <div class="detail-tags" id="detail-tags"></div>
            <p class="detail-desc" id="detail-desc"></p>
          </div>
          <div class="detail-side">
            <p class="detail-line" id="detail-cast"></p>
            <p class="detail-line" id="detail-genres"></p>
          </div>
        </div>
        <div class="detail-section" id="detail-episodes">
          <div class="ep-bar">
            <h3>Episodes</h3>
            <select id="season-picker" class="season-picker"></select>
          </div>
          <div class="ep-list" id="ep-list"></div>
        </div>
        <div class="detail-section" id="detail-similar">
          <h3>You might also like</h3>
          <div class="similar-grid" id="similar-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="player" id="player">
  <button class="player-close" id="player-close">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    <span>Back</span>
  </button>
  <div class="player-frame-container">
    <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
